name: Terraform IAM Pipeline

# ============================================================
# MAIN PIPELINE — Deploys the IAM infrastructure.
#
# Prerequisites: bootstrap.yml must have been run first to
# create the IAM resource group and grant the SP the necessary
# roles. See .github/workflows/bootstrap.yml.
# ============================================================

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches:
      - main
  # Nightly drift detection — disabled until a prod environment exists.
  # Re-enable once prod secrets (AZURE_*_PROD, KEY_VAULT_NAME_PROD) are configured.
  # schedule:
  #   - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev or prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terraform action to run"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: "."

concurrency:
  group: terraform-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  validate:
    name: "Validate & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Init (validate only)
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: ${{ env.WORKING_DIR }}

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - run: tflint --init

      - run: tflint --format compact --recursive

      - name: Checkov (block on HIGH/CRITICAL)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.WORKING_DIR }}
          framework: terraform
          soft_fail_on: LOW,MEDIUM
          hard_fail_on: HIGH,CRITICAL
          output_format: cli

  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event_name != 'schedule' && (github.event.inputs.environment || 'dev') || '' }}
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (DEV)
        if: ${{ github.event_name != 'schedule' && (github.event.inputs.environment || 'dev') != 'prod' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Azure Login (PROD — manual dispatch)
        if: ${{ github.event_name != 'schedule' && github.event.inputs.environment == 'prod' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Azure Login (PROD — drift detection)
        if: ${{ github.event_name == 'schedule' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Set Terraform ARM env vars (DEV)
        if: ${{ github.event_name != 'schedule' && (github.event.inputs.environment || 'dev') != 'prod' }}
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID_DEV }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID_DEV }}" >> $GITHUB_ENV
          echo "ARM_ACCESS_KEY=${{ secrets.TF_STATE_ACCESS_KEY_DEV }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "TF_VAR_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}" >> $GITHUB_ENV
          echo "TF_VAR_tenant_id=${{ secrets.AZURE_TENANT_ID_DEV }}" >> $GITHUB_ENV
          echo "TF_VAR_tenant_domain=${{ secrets.AZURE_TENANT_DOMAIN_DEV }}" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=${{ secrets.ALERT_EMAIL }}" >> $GITHUB_ENV
          echo "TF_VAR_key_vault_name=${{ secrets.KEY_VAULT_NAME_DEV }}" >> $GITHUB_ENV

      - name: Set Terraform ARM env vars (PROD)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.environment == 'prod' }}
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID_PROD }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID_PROD }}" >> $GITHUB_ENV
          echo "ARM_ACCESS_KEY=${{ secrets.TF_STATE_ACCESS_KEY_PROD }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "TF_VAR_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}" >> $GITHUB_ENV
          echo "TF_VAR_tenant_id=${{ secrets.AZURE_TENANT_ID_PROD }}" >> $GITHUB_ENV
          echo "TF_VAR_tenant_domain=${{ secrets.AZURE_TENANT_DOMAIN_PROD }}" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=${{ secrets.ALERT_EMAIL }}" >> $GITHUB_ENV
          echo "TF_VAR_key_vault_name=${{ secrets.KEY_VAULT_NAME_PROD }}" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -var="environment=${{ github.event_name == 'schedule' && 'prod' || (github.event.inputs.environment || 'dev') }}" \
            -out=tfplan \
            -detailed-exitcode \
            -no-color
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          exit 0
        working-directory: ${{ env.WORKING_DIR }}

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == 1
        run: |
          echo "::error::Terraform plan failed (exit code 1)"
          exit 1

      - name: Flag drift (scheduled run only)
        if: github.event_name == 'schedule' && steps.plan.outputs.exitcode == 2
        run: |
          echo "::warning::Drift detected in prod — infrastructure differs from Terraform state. Review the plan output and reconcile manually or via a follow-up apply."

      - name: Upload Plan Artifact
        if: github.event_name != 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}-${{ github.run_id }}
          path: tfplan
          retention-days: 30

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          terraform show -no-color tfplan > plan.txt
          {
            echo "#### Terraform Plan — ${{ github.event.inputs.environment || 'dev' }} 🔍"
            echo '```'
            tail -c 60000 plan.txt
            echo '```'
            echo "_Full plan available in the [workflow run artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})._"
          } > comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md
        working-directory: ${{ env.WORKING_DIR }}

  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (DEV)
        if: ${{ (github.event.inputs.environment || 'dev') != 'prod' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Azure Login (PROD)
        if: ${{ github.event.inputs.environment == 'prod' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Set Terraform ARM env vars (DEV)
        if: ${{ (github.event.inputs.environment || 'dev') != 'prod' }}
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID_DEV }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID_DEV }}" >> $GITHUB_ENV
          echo "ARM_ACCESS_KEY=${{ secrets.TF_STATE_ACCESS_KEY_DEV }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "TF_VAR_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}" >> $GITHUB_ENV
          echo "TF_VAR_tenant_id=${{ secrets.AZURE_TENANT_ID_DEV }}" >> $GITHUB_ENV
          echo "TF_VAR_tenant_domain=${{ secrets.AZURE_TENANT_DOMAIN_DEV }}" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=${{ secrets.ALERT_EMAIL }}" >> $GITHUB_ENV
          echo "TF_VAR_key_vault_name=${{ secrets.KEY_VAULT_NAME_DEV }}" >> $GITHUB_ENV

      - name: Set Terraform ARM env vars (PROD)
        if: ${{ github.event.inputs.environment == 'prod' }}
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID_PROD }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID_PROD }}" >> $GITHUB_ENV
          echo "ARM_ACCESS_KEY=${{ secrets.TF_STATE_ACCESS_KEY_PROD }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "TF_VAR_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}" >> $GITHUB_ENV
          echo "TF_VAR_tenant_id=${{ secrets.AZURE_TENANT_ID_PROD }}" >> $GITHUB_ENV
          echo "TF_VAR_tenant_domain=${{ secrets.AZURE_TENANT_DOMAIN_PROD }}" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=${{ secrets.ALERT_EMAIL }}" >> $GITHUB_ENV
          echo "TF_VAR_key_vault_name=${{ secrets.KEY_VAULT_NAME_PROD }}" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}-${{ github.run_id }}
          path: ${{ env.WORKING_DIR }}

      - name: Verify plan is still current
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan-recheck -no-color \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}"
          code=$?
          if [ "$code" -eq 2 ]; then
            echo "::error::State has drifted since the plan was generated. Re-run plan before applying."
            exit 1
          elif [ "$code" -eq 1 ]; then
            echo "::error::Terraform plan re-check failed."
            exit 1
          fi
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Output
        run: terraform output -json > tf-outputs-${{ github.event.inputs.environment || 'dev' }}.json
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs-${{ github.event.inputs.environment || 'dev' }}-${{ github.run_id }}
          path: tf-outputs-${{ github.event.inputs.environment || 'dev' }}.json
          retention-days: 90
